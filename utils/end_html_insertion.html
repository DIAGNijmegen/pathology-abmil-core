<script>
    function searchPoint() {
        var searchValue = document.getElementById("searchBox").value.toLowerCase();

        var graphDiv = document.querySelector(".plotly-graph-div")
        var plotData = graphDiv.data;  // Get all traces
  
        if (!plotData || plotData.length === 0) {
            document.getElementById("message").innerHTML = "No data found in the plot!";
            return;

        let subIndex = -1;
        let arrIndex = -1;

            for (let i = 0; i < hoverText.length; i++) {
                lasthoverText = hoverText[i].toLowerCase();  // Update the last hover text
                if (hoverText[i].toLowerCase().includes(searchValue)) {
                    subIndex = i;
                    arrIndex = traceIndex;
                    break;
                }
            }

            if (subIndex !== -1) break;

            // Plotly.relayout(graphDiv, {

            //       "yaxis.range": [ymarg1, ymarg2]
            // });
  
            // Update only the specific point (arrIndex, subIndex)
            let updateDataArr = plotData[arrIndex];
